<!DOCTYPE html>
<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SIMPPANG - Financials</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-on-background min-h-screen safe-p-bottom">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass-header flex justify-between items-center px-6 h-20">
        <div class="flex items-center gap-3">
            <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface shadow-sm text-primary">
                <span class="material-symbols-outlined font-bold">arrow_back</span>
            </a>
            <h1 class="text-xl font-black text-primary uppercase tracking-tighter">Keuangan</h1>
        </div>
        <button onclick="openModalSetting()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface shadow-sm text-on-surface-variant">
            <span class="material-symbols-outlined">settings</span>
        </button>
    </header>

    <main class="pt-28 px-6 max-w-5xl mx-auto animate-slide-up">
        <!-- Hero Summary -->
        <section class="mb-8">
            <p class="text-[10px] font-black text-secondary uppercase tracking-[0.2em] mb-2">Ringkasan Operasional</p>
            <div class="grid grid-cols-1 gap-4">
                <!-- Modal Card -->
                <div onclick="openModalSetting()" class="bg-primary p-6 rounded-[32px] text-white shadow-premium relative overflow-hidden active:scale-95 transition-all">
                    <div class="absolute -right-4 -bottom-4 opacity-10">
                        <span class="material-symbols-outlined text-[100px]">account_balance</span>
                    </div>
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">Modal Awal</p>
                    <h3 id="modal-display" class="text-3xl font-black tracking-tighter mb-2">Rp 0</h3>
                    <span id="status-badge" class="px-3 py-1 bg-white/10 rounded-full text-[9px] font-black uppercase tracking-widest">Aktif</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="app-card shadow-premium p-5 relative overflow-hidden">
                        <p class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest mb-1">Pengeluaran</p>
                        <h3 id="total-exp-display" class="text-lg font-black text-on-surface tracking-tighter">Rp 0</h3>
                        <div class="w-full bg-outline/10 h-1 rounded-full mt-2 overflow-hidden">
                            <div id="progress-bar" class="bg-primary h-full transition-all duration-700" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="app-card shadow-premium p-5 relative overflow-hidden border-secondary/20">
                        <p class="text-[10px] font-black text-secondary uppercase tracking-widest mb-1">Harga Jual</p>
                        <h3 id="recomm-price" class="text-lg font-black text-secondary tracking-tighter">-</h3>
                        <p class="text-[9px] font-bold text-on-surface-variant/40 mt-1">Margin: <span id="margin-display">0%</span></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Transaction List -->
        <section class="mb-12">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xs font-black text-on-surface uppercase tracking-[0.2em] flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-sm">history</span> Riwayat Biaya
                </h2>
                <button onclick="openModal()" class="w-10 h-10 bg-primary text-white rounded-xl shadow-premium flex items-center justify-center active:scale-90 transition-all">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>

            <div id="expense-container" class="space-y-3">
                <!-- Cards will be injected by JS -->
                <div id="empty-state" class="text-center py-12 bg-white rounded-[32px] border-2 border-dashed border-outline/20">
                    <span class="material-symbols-outlined text-outline/40 text-4xl mb-2">receipt_long</span>
                    <p class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">Belum ada catatan</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Global Nav -->
    <nav class="fixed bottom-0 left-0 w-full z-50 glass-nav flex justify-around items-center px-4 pb-8 pt-4">
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="index.html">
            <span class="material-symbols-outlined text-[24px]">home</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Beranda</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="farming.html">
            <span class="material-symbols-outlined text-[24px]">agriculture</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Pemeliharaan</span>
        </a>
        <a class="nav-item active flex flex-col items-center justify-center gap-1" href="financials.html">
            <span class="material-symbols-outlined text-[24px]">payments</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Keuangan</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="marketing.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Pemasaran</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="asisten.html">
            <span class="material-symbols-outlined text-[24px]">smart_toy</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">AI</span>
        </a>
    </nav>


<script>
    // State Management
    let state = {
        modalAwal: parseInt(localStorage.getItem('simppang_modal')) || 0,
        expenses: JSON.parse(localStorage.getItem('simppang_expenses')) || []
    };

    const formatter = new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR',
        maximumFractionDigits: 0
    });

    function init() {
        render();
    }

    function saveState() {
        localStorage.setItem('simppang_modal', state.modalAwal);
        localStorage.setItem('simppang_expenses', JSON.stringify(state.expenses));
        render();
    }

    function render() {
        const totalExp = state.expenses.reduce((acc, curr) => acc + parseInt(curr.jumlah), 0);
        const percent = state.modalAwal > 0 ? (totalExp / state.modalAwal * 100).toFixed(1) : 0;
        
        // Update Summary Cards
        document.getElementById('modal-display').innerText = formatter.format(state.modalAwal);
        document.getElementById('total-exp-display').innerText = formatter.format(totalExp);
        document.getElementById('progress-bar').style.width = Math.min(percent, 100) + '%';
        document.getElementById('usage-text').innerText = `Pemakaian Modal: ${percent}%`;
        document.getElementById('status-badge').innerText = state.modalAwal > 0 ? 'Aktif' : 'Belum Ada Data';

        // HPP Calculation (Assuming 2000 Birds)
        const hpp = totalExp / 2000;
        const profit = hpp * 0.2;
        const recomend = hpp + profit;

        document.getElementById('hpp-display').innerText = hpp > 0 ? formatter.format(hpp) : '-';
        document.getElementById('profit-display').innerText = recomend > 0 ? formatter.format(recomend) : 'Rp 0';
        document.getElementById('recomm-price').innerText = recomend > 0 ? formatter.format(recomend) : '-';
        document.getElementById('margin-display').innerText = recomend > 0 ? '20%' : '0%';

        // Render Cards
        const emptyState = document.getElementById('empty-state');
        const container = document.getElementById('expense-container');

        if (state.expenses.length === 0) {
            emptyState.classList.remove('hidden');
        } else {
            emptyState.classList.add('hidden');
            container.innerHTML = state.expenses.map((exp, index) => `
                <div class="app-card shadow-premium p-5 flex justify-between items-center group animate-slide-up">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-primary-fixed/30 flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined">${getIcon(exp.kategori)}</span>
                        </div>
                        <div>
                            <h4 class="text-sm font-black text-on-surface uppercase tracking-tighter">${exp.deskripsi}</h4>
                            <p class="text-[9px] font-bold text-on-surface-variant uppercase opacity-60">${exp.kategori}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black text-primary tracking-tighter">${formatter.format(exp.jumlah)}</p>
                        <button onclick="deleteExpense(${index})" class="text-red-500/40 hover:text-red-500 active:scale-90 transition-all">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }
    }

    function getIcon(cat) {
        const icons = {
            'Pakan': 'soup_kitchen',
            'DOC/Bibit': 'egg_alt',
            'Pengobatan': 'medication',
            'SDM': 'badge',
            'Kandang': 'home_repair_service',
            'Lainnya': 'more_horiz'
        };
        return icons[cat] || 'receipt';
    }

    // Modal Handlers
    function openModal() { document.getElementById('modal-biaya').classList.remove('hidden'); }
    function openModalSetting() { document.getElementById('modal-modal').classList.remove('hidden'); }
    function closeModal() {
        document.getElementById('modal-biaya').classList.add('hidden');
        document.getElementById('modal-modal').classList.add('hidden');
    }

    // Actions
    document.getElementById('form-biaya').onsubmit = (e) => {
        e.preventDefault();
        const expense = {
            kategori: document.getElementById('kategori').value,
            deskripsi: document.getElementById('deskripsi').value,
            jumlah: document.getElementById('jumlah').value,
            id: Date.now()
        };
        state.expenses.push(expense);
        saveState();
        closeModal();
        e.target.reset();
    };

    document.getElementById('form-modal').onsubmit = (e) => {
        e.preventDefault();
        state.modalAwal = parseInt(document.getElementById('input-modal-value').value);
        saveState();
        closeModal();
    };

    function deleteExpense(index) {
        if(confirm('Hapus pencatatan ini?')) {
            state.expenses.splice(index, 1);
            saveState();
        }
    }

    init();
</script>
</body></html>
