<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SIMPPANG - Panel Manajemen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-on-background min-h-screen safe-p-bottom">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass-header flex justify-between items-center px-6 h-20">
        <div class="flex items-center gap-3">
            <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface shadow-sm text-primary">
                <span class="material-symbols-outlined font-bold">arrow_back</span>
            </a>
            <h1 class="text-xl font-black text-primary uppercase tracking-tighter">Pengaturan</h1>
        </div>
    </header>

    <main class="pt-28 px-6 max-w-5xl mx-auto animate-slide-up">
        <!-- Farm Profile Section -->
        <section class="app-card shadow-premium p-6 mb-8">
            <h3 class="text-xs font-black text-on-surface uppercase tracking-widest mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-sm">store</span> Profil Kandang
            </h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-2">Nama Peternakan</label>
                    <input type="text" id="farm-name" class="w-full bg-surface-container-low border-0 rounded-2xl p-4 text-sm font-black focus:ring-0">
                </div>
                <div>
                    <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-2">Alamat Utama</label>
                    <textarea id="farm-address" class="w-full bg-surface-container-low border-0 rounded-2xl p-4 text-sm font-black focus:ring-0 h-24"></textarea>
                </div>
                <button onclick="saveProfile()" class="w-full bg-primary text-white font-black text-xs py-5 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">
                    Simpan Profil
                </button>
            </div>
        </section>

        <!-- Maintenance Section -->
        <section class="app-card shadow-premium p-6 mb-8 border-red-100 bg-red-50/20">
            <h3 class="text-xs font-black text-red-600 uppercase tracking-widest mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">dangerous</span> Area Berbahaya
            </h3>
            <div class="space-y-3">
                <button onclick="resetData()" class="w-full flex items-center justify-between p-4 bg-white rounded-2xl border border-red-100 text-red-600 active:scale-95 transition-all">
                    <span class="text-[10px] font-black uppercase">Reset Hapus Semua Data</span>
                    <span class="material-symbols-outlined">delete_forever</span>
                </button>
            </div>
        </section>

        <!-- App Info -->
        <div class="text-center py-10">
            <p class="text-[8px] font-black text-on-surface-variant uppercase tracking-[0.3em] opacity-40">SIMPPANG v1.1.0</p>
            <p class="text-[10px] font-black text-primary mt-2 uppercase tracking-widest">Peternak Modern Belitang</p>
        </div>
    </main>

    <!-- Global Nav -->
    <nav class="fixed bottom-0 left-0 w-full z-50 glass-nav flex justify-around items-center px-4 pb-8 pt-4">
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="index.html">
            <span class="material-symbols-outlined text-[24px]">home</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Beranda</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="farming.html">
            <span class="material-symbols-outlined text-[24px]">agriculture</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Ternak</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="financials.html">
            <span class="material-symbols-outlined text-[24px]">payments</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Uang</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="marketing.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Pasar</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="asisten.html">
            <span class="material-symbols-outlined text-[24px]">smart_toy</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">AI</span>
        </a>
    </nav>

    <script>
        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('simppang_profile')) || {};
            document.getElementById('farm-name').value = profile.name || '';
            document.getElementById('farm-address').value = profile.address || '';
        }

        function saveProfile() {
            const profile = {
                name: document.getElementById('farm-name').value,
                address: document.getElementById('farm-address').value
            };
            localStorage.setItem('simppang_profile', JSON.stringify(profile));
            alert('Profil berhasil disimpan!');
        }

        function resetData() {
            if(confirm('HAPUS SEMUA DATA? Tindakan ini tidak bisa dibatalkan.')) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        }
        loadProfile();
    </script>
</body>
</html>
