<!DOCTYPE html>
<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SIMPPANG - Pemasaran</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-on-background min-h-screen safe-p-bottom">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass-header flex justify-between items-center px-6 h-20">
        <div class="flex items-center gap-3">
            <a href="index.html" class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface shadow-sm text-primary">
                <span class="material-symbols-outlined font-bold">arrow_back</span>
            </a>
            <h1 class="text-xl font-black text-primary uppercase tracking-tighter">Pemasaran</h1>
        </div>
        <button onclick="openTab()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface shadow-sm text-on-surface-variant">
            <span class="material-symbols-outlined">verified_user</span>
        </button>
    </header>

    <main class="pt-28 px-6 max-w-5xl mx-auto animate-slide-up">
        <!-- Hero -->
        <header class="mb-10">
            <p class="text-[10px] font-black text-secondary uppercase tracking-[0.2em] mb-2">Pasar & Penjualan</p>
            <h2 class="text-3xl font-black text-primary tracking-tighter leading-tight">Kelola Stok<br/>& Harga Pasar</h2>
        </header>

        <!-- Product Cards -->
        <div class="grid grid-cols-1 gap-4 mb-10">
            <!-- Telur -->
            <div class="app-card shadow-premium p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-yellow-50 rounded-2xl flex items-center justify-center text-2xl">🥚</div>
                    <div>
                        <h3 class="text-sm font-black text-on-surface uppercase tracking-tighter">Telur Ayam</h3>
                        <p class="text-[9px] font-bold text-on-surface-variant uppercase opacity-60">Komoditas Utama</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="text-right">
                        <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-1">Harga/Butir</label>
                        <input type="number" id="price-telur" onchange="updateMarketing('telur')" class="w-20 bg-surface-container-low border-0 rounded-lg p-2 text-xs font-black text-primary text-right" value="2500">
                    </div>
                    <div class="text-right">
                        <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-1">Stok</label>
                        <input type="number" id="stock-telur" onchange="updateMarketing('telur')" class="w-14 bg-surface-container-low border-0 rounded-lg p-2 text-xs font-black text-on-surface text-right" value="0">
                    </div>
                </div>
            </div>

            <!-- DOC -->
            <div class="app-card shadow-premium p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-primary-fixed/30 rounded-2xl flex items-center justify-center text-2xl">🐣</div>
                    <div>
                        <h3 class="text-sm font-black text-on-surface uppercase tracking-tighter">DOC (Bibit)</h3>
                        <p class="text-[9px] font-bold text-on-surface-variant uppercase opacity-60">Siklus Awal</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="text-right">
                        <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-1">Harga/Ekor</label>
                        <input type="number" id="price-doc" onchange="updateMarketing('doc')" class="w-20 bg-surface-container-low border-0 rounded-lg p-2 text-xs font-black text-primary text-right" value="8500">
                    </div>
                    <div class="text-right">
                        <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-1">Stok</label>
                        <input type="number" id="stock-doc" onchange="updateMarketing('doc')" class="w-14 bg-surface-container-low border-0 rounded-lg p-2 text-xs font-black text-on-surface text-right" value="0">
                    </div>
                </div>
            </div>

            <!-- Indukan -->
            <div class="app-card shadow-premium p-5 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-secondary-fixed/50 rounded-2xl flex items-center justify-center text-2xl">🐓</div>
                    <div>
                        <h3 class="text-sm font-black text-on-surface uppercase tracking-tighter">Indukan</h3>
                        <p class="text-[9px] font-bold text-on-surface-variant uppercase opacity-60">Produksi</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="text-right">
                        <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-1">Harga/Ekor</label>
                        <input type="number" id="price-indukan" onchange="updateMarketing('indukan')" class="w-20 bg-surface-container-low border-0 rounded-lg p-2 text-xs font-black text-primary text-right" value="75000">
                    </div>
                    <div class="text-right">
                        <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-1">Stok</label>
                        <input type="number" id="stock-indukan" onchange="updateMarketing('indukan')" class="w-14 bg-surface-container-low border-0 rounded-lg p-2 text-xs font-black text-on-surface text-right" value="0">
                    </div>
                </div>
            </div>
        </div>

        <!-- Social Media Section -->
        <section class="mb-12">
            <h3 class="text-xs font-black text-on-surface uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-sm">share</span> Link Komunitas
            </h3>
            <div class="grid grid-cols-2 gap-3">
                <div class="app-card p-4 flex flex-col gap-2">
                    <p class="text-[8px] font-black text-pink-500 uppercase">Instagram</p>
                    <input type="text" id="link-ig" onchange="updateLinks()" class="w-full bg-surface-container-low border-0 rounded-xl p-3 text-[10px] font-bold">
                </div>
                <div class="app-card p-4 flex flex-col gap-2">
                    <p class="text-[8px] font-black text-blue-600 uppercase">WhatsApp</p>
                    <input type="text" id="link-wa" onchange="updateLinks()" class="w-full bg-surface-container-low border-0 rounded-xl p-3 text-[10px] font-bold">
                </div>
            </div>
        </section>
    </main>

    <!-- Global Nav -->
    <nav class="fixed bottom-0 left-0 w-full z-50 glass-nav flex justify-around items-center px-4 pb-8 pt-4">
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="index.html">
            <span class="material-symbols-outlined text-[24px]">home</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Beranda</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="farming.html">
            <span class="material-symbols-outlined text-[24px]">agriculture</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Ternak</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="financials.html">
            <span class="material-symbols-outlined text-[24px]">payments</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Uang</span>
        </a>
        <a class="nav-item active flex flex-col items-center justify-center gap-1" href="marketing.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Pasar</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="asisten.html">
            <span class="material-symbols-outlined text-[24px]">smart_toy</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">AI</span>
        </a>
    </nav>
</a>
</nav>

<script>
    // Marketing Data Logic
    const types = ['telur', 'doc', 'indukan', 'daging'];
    
    function loadMarketing() {
        const data = JSON.parse(localStorage.getItem('simppang_marketing')) || {};
        const links = JSON.parse(localStorage.getItem('simppang_links')) || {};
        const seller = JSON.parse(localStorage.getItem('simppang_seller')) || {};

        // Load Stock/Price
        types.forEach(t => {
            if(data[t]) {
                document.getElementById(`price-${t}`).value = data[t].price;
                document.getElementById(`stock-${t}`).value = data[t].stock;
            }
        });

        // Load Links
        document.getElementById('link-ig').value = links.ig || '';
        document.getElementById('link-fb').value = links.fb || '';
        document.getElementById('link-tiktok').value = links.tiktok || '';
        document.getElementById('link-wa').value = links.wa || '';

        // Load Seller
        document.getElementById('seller-name').value = seller.name || '';
        document.getElementById('seller-address').value = seller.address || '';
        document.getElementById('seller-bank').value = seller.bank || '';
    }

    function updateMarketing(type) {
        const data = JSON.parse(localStorage.getItem('simppang_marketing')) || {};
        data[type] = {
            price: document.getElementById(`price-${type}`).value,
            stock: document.getElementById(`stock-${type}`).value
        };
        localStorage.setItem('simppang_marketing', JSON.stringify(data));
    }

    function updateLinks() {
        const links = {
            ig: document.getElementById('link-ig').value,
            fb: document.getElementById('link-fb').value,
            tiktok: document.getElementById('link-tiktok').value,
            wa: document.getElementById('link-wa').value
        };
        localStorage.setItem('simppang_links', JSON.stringify(links));
    }

    document.getElementById('form-seller').onsubmit = (e) => {
        e.preventDefault();
        const seller = {
            name: document.getElementById('seller-name').value,
            address: document.getElementById('seller-address').value,
            bank: document.getElementById('seller-bank').value
        };
        localStorage.setItem('simppang_seller', JSON.stringify(seller));
        closeModal();
    }

    function openTab(id) { document.getElementById('modal-pembayaran').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal-pembayaran').classList.add('hidden'); }

    loadMarketing();
</script>
</body></html>
</body></html>
