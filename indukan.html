<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SIMPPANG - Input Indukan</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-background text-on-background min-h-screen safe-p-bottom">
    <!-- Header -->
    <header class="fixed top-0 w-full z-50 glass-header flex justify-between items-center px-6 h-20">
        <div class="flex items-center gap-3">
            <a href="farming.html" class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface shadow-sm text-primary">
                <span class="material-symbols-outlined font-bold">arrow_back</span>
            </a>
            <h1 class="text-xl font-black text-primary uppercase tracking-tighter">Input Indukan</h1>
        </div>
    </header>

    <main class="pt-28 px-6 max-w-5xl mx-auto animate-slide-up">
        <div class="app-card shadow-premium p-6 border-secondary/20 bg-gradient-to-br from-white to-secondary-fixed/10">
            <h2 class="text-xs font-black uppercase tracking-widest text-secondary mb-4 flex items-center gap-2"><span class="material-symbols-outlined">edit_document</span> Pencatatan Indukan</h2>
            <form id="indukan-form" class="space-y-4">
                <div>
                    <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-2">Tanggal Masuk</label>
                    <input type="date" id="indukan-tgl" class="w-full bg-surface-container-low border-0 rounded-2xl p-4 text-sm font-black focus:ring-0">
                </div>
                <div>
                    <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-2">Jumlah Populasi (Ekor)</label>
                    <input type="number" id="indukan-jumlah" class="w-full bg-surface-container-low border-0 rounded-2xl p-4 text-sm font-black focus:ring-0" placeholder="">
                </div>
                <div>
                    <label class="block text-[8px] font-black text-on-surface-variant uppercase mb-2">Berat Rata-Rata per Ekor (kg)</label>
                    <input type="number" step="0.1" id="indukan-berat" class="w-full bg-surface-container-low border-0 rounded-2xl p-4 text-sm font-black focus:ring-0" placeholder="">
                </div>
                <button type="button" id="btn-simpan" onclick="evaluasiIndukan()" class="w-full bg-white text-green-700 border-2 border-green-600 font-black text-xs py-4 rounded-2xl shadow-sm active:scale-95 transition-all uppercase tracking-widest mt-2">
                    Simpan & Evaluasi
                </button>
            </form>

            <!-- Kesimpulan Box -->
            <div id="hasil-evaluasi" class="mt-6 p-5 rounded-2xl hidden border-2 transition-all">
                <div class="flex items-center gap-2 mb-2">
                    <span id="hasil-icon" class="material-symbols-outlined text-xl">info</span>
                    <h4 class="text-xs font-black uppercase tracking-widest" id="hasil-title">Kesimpulan</h4>
                </div>
                <p class="text-[10px] font-bold opacity-80 leading-relaxed" id="hasil-desc">Keterangan hasil evaluasi.</p>
            </div>
        </div>
    </main>

    <!-- Global Nav -->
    <nav class="fixed bottom-0 left-0 w-full z-50 glass-nav flex justify-around items-center px-4 pb-8 pt-4">
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="index.html">
            <span class="material-symbols-outlined text-[24px]">home</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Beranda</span>
        </a>
        <a class="nav-item active flex flex-col items-center justify-center gap-1" href="farming.html">
            <span class="material-symbols-outlined text-[24px]">agriculture</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Pemeliharaan</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="financials.html">
            <span class="material-symbols-outlined text-[24px]">payments</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Keuangan</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="marketing.html">
            <span class="material-symbols-outlined text-[24px]">storefront</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">Pemasaran</span>
        </a>
        <a class="nav-item flex flex-col items-center justify-center gap-1 text-on-surface-variant" href="asisten.html">
            <span class="material-symbols-outlined text-[24px]">smart_toy</span>
            <span class="text-[10px] font-black uppercase tracking-tighter">AI</span>
        </a>
    </nav>
    <script>
        function checkInputs() {
            const tgl = document.getElementById('indukan-tgl').value;
            const jumlah = document.getElementById('indukan-jumlah').value;
            const berat = document.getElementById('indukan-berat').value;
            const btn = document.getElementById('btn-simpan');
            
            if(tgl && jumlah && berat) {
                btn.className = "w-full bg-green-700 text-white border-2 border-green-700 font-black text-xs py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest mt-2 hover:bg-green-800";
            } else {
                btn.className = "w-full bg-white text-green-700 border-2 border-green-600 font-black text-xs py-4 rounded-2xl shadow-sm active:scale-95 transition-all uppercase tracking-widest mt-2";
            }
        }

        document.getElementById('indukan-tgl').addEventListener('input', checkInputs);
        document.getElementById('indukan-jumlah').addEventListener('input', checkInputs);
        document.getElementById('indukan-berat').addEventListener('input', checkInputs);

        function evaluasiIndukan() {
            const tgl = document.getElementById('indukan-tgl').value;
            const jumlah = parseInt(document.getElementById('indukan-jumlah').value) || 0;
            const berat = parseFloat(document.getElementById('indukan-berat').value) || 0;
            
            const box = document.getElementById('hasil-evaluasi');
            const title = document.getElementById('hasil-title');
            const desc = document.getElementById('hasil-desc');
            const icon = document.getElementById('hasil-icon');
            
            if(!tgl || jumlah === 0 || berat === 0) {
                box.className = "mt-6 p-5 rounded-2xl border-2 border-gray-400 bg-gray-100 text-gray-900 shadow-sm";
                icon.innerText = "info";
                title.innerText = "Data Belum Lengkap";
                desc.innerText = "Harap isi tanggal, jumlah ekor, dan berat rata-rata untuk melihat kesimpulan.";
                box.classList.remove('hidden');
                return;
            }
            
            // Evaluasi standar berat ayam indukan (idealnya 1.5 - 2.5 kg tergantung jenis kelamin)
            if(berat >= 1.5 && berat <= 2.8) {
                box.className = "mt-6 p-5 rounded-2xl border-2 border-secondary bg-secondary-fixed/30 text-secondary";
                icon.innerText = "check_circle";
                title.innerText = "Berat Ideal Produksi";
                desc.innerText = `Berat ${berat} kg sangat ideal untuk masa reproduksi. Pastikan asupan kalsium dari pakan cukup untuk menunjang kualitas kerabang telur.`;
            } else if(berat < 1.5) {
                box.className = "mt-6 p-5 rounded-2xl border-2 border-red-500 bg-red-50 text-red-800";
                icon.innerText = "trending_down";
                title.innerText = "Berat Kurang (Underweight)";
                desc.innerText = `Berat indukan ${berat} kg masih kurang. Hal ini dapat menghambat awal bertelur. Tingkatkan protein pakan menjadi 17-18%.`;
            } else {
                box.className = "mt-6 p-5 rounded-2xl border-2 border-blue-500 bg-blue-50 text-blue-800";
                icon.innerText = "warning";
                title.innerText = "Kelebihan Lemak (Overweight)";
                desc.innerText = `Berat ${berat} kg berisiko kegemukan (perlemakan). Indukan gemuk akan malas kawin/bertelur. Segera batasi kalori pakan dan perluas area umbaran agar sering bergerak.`;
            }
            
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>
